<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmed — GreyPile</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #0D0D0D;
      color: #CCCCCC;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 400px;
      width: 100%;
      background-color: #1A1A1A;
      border-radius: 12px;
      border: 1px solid #2A2A2A;
      padding: 40px 32px;
      text-align: center;
    }
    .brand {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #555555;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #F5F5F5;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #AAAAAA;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .hint {
      font-size: 12px;
      color: #555555;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="brand">GreyPile</p>
    <div class="icon">✓</div>
    <h1>Email Confirmed</h1>
    <p>Your account is now active, Commander. Open the GreyPile app and sign in to begin tracking your armies.</p>
    <p class="hint">You can close this page</p>
  </div>
</body>
</html>
